name: build armv8 openwrt

on:
  workflow_dispatch:
    inputs:
      source:
        description: '选择要编译的LUCI版本'
        required: true
        default: '24.10'
        type: choice
        options: ['18.06', '24.10']

      ip:
        description: '设置默认登录IP'
        required: false
        default: '192.168.1.190'

      toolchain:
        description: '使用toolchain缓存'
        required: false
        default: true
        type: boolean

      zsh_tool:
        description: '预设zsh终端工具'
        required: false
        default: true
        type: boolean

      openclash:
        description: '预设openclash内核'
        required: false
        default: 'arm64'
        type: choice
        options: [false, amd64, arm64, armv7, armv6, armv5, 386]

      artifact:
        description: '上传固件到Artifact'
        required: false
        default: true
        type: boolean

      release:
        description: '上传固件到Releases'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04
    name: build armv8 ${{ github.event.inputs.source }}

    env:
      DEFAULT_IP: ${{ github.event.inputs.ip }}
      TOOLCHAIN: ${{ github.event.inputs.toolchain }}
      ZSH_TOOL: ${{ github.event.inputs.zsh_tool }}
      CLASH_KERNEL: ${{ github.event.inputs.openclash }}
      CONFIG_FILE: configs/armv8-${{ github.event.inputs.source }}.config
      DIY_SCRIPT: diy-${{ github.event.inputs.source }}.sh

      # for output naming
      SOURCE_REPO: immortalwrt
      RELEASE_TAG: armv8-${{ github.event.inputs.source }}

      TOOLCHAIN_TAG: toolchain
      UPLOAD_BIN_DIR: false
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" || true
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile || true
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install rename $(curl -fsSL is.gd/depends_ubuntu_2404)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      - name: Combine Disks
        run: |
          set -euo pipefail
          sudo mkdir -p /mnt

          get_avail_kb() {
            path="$1"
            avail=$(df --block-size=1024 --output=avail "$path" 2>/dev/null | tail -n1 || echo 0)
            avail="${avail//[^0-9]/}"
            echo "${avail:-0}"
          }

          RESERVE_MNT_KB=$((1024*1024*1))   # 1GB reserved on /mnt
          RESERVE_ROOT_KB=$((1024*1024*4))  # 4GB reserved on /

          MIN_MNT_BYTES=$((1 * 1024 * 1024 * 1024))
          MIN_ROOT_BYTES=$((1 * 1024 * 1024 * 1024))

          MNT_AVAIL_KB=$(get_avail_kb /mnt)
          ROOT_AVAIL_KB=$(get_avail_kb /)

          if [ "$MNT_AVAIL_KB" -gt "$RESERVE_MNT_KB" ]; then
            MNT_SIZE_BYTES=$(( (MNT_AVAIL_KB - RESERVE_MNT_KB) * 1024 ))
          else
            echo "Warning: not enough available space on /mnt. Fallback to ${MIN_MNT_BYTES} bytes."
            MNT_SIZE_BYTES=$MIN_MNT_BYTES
          fi

          if [ "$ROOT_AVAIL_KB" -gt "$RESERVE_ROOT_KB" ]; then
            ROOT_SIZE_BYTES=$(( (ROOT_AVAIL_KB - RESERVE_ROOT_KB) * 1024 ))
          else
            echo "Warning: not enough available space on /. Fallback to ${MIN_ROOT_BYTES} bytes."
            ROOT_SIZE_BYTES=$MIN_ROOT_BYTES
          fi

          sudo rm -f /mnt/mnt.img
          if ! sudo fallocate -l "${MNT_SIZE_BYTES}" /mnt/mnt.img 2>/dev/null; then
            sudo truncate -s "${MNT_SIZE_BYTES}" /mnt/mnt.img
          fi
          MNT_NAME=$(sudo losetup -Pf --show /mnt/mnt.img)
          sudo pvcreate -f "$MNT_NAME"

          sudo rm -f /root.img
          if ! sudo fallocate -l "${ROOT_SIZE_BYTES}" /root.img 2>/dev/null; then
            sudo truncate -s "${ROOT_SIZE_BYTES}" /root.img
          fi
          ROOT_NAME=$(sudo losetup -Pf --show /root.img)
          sudo pvcreate -f "$ROOT_NAME"

          sudo vgcreate actions "$MNT_NAME" "$ROOT_NAME"
          sudo lvcreate -n disk -l 100%FREE actions
          LV_NAME=$(sudo lvscan | awk -F "'" '{print $2}')
          sudo mkfs.btrfs -L combinedisk "$LV_NAME"

          sudo mkdir -p /workdir
          sudo mount -o compress=zstd "$LV_NAME" /workdir
          sudo chown -R runner:runner /workdir
          df -hT

      - name: Load Compile Script
        run: |
          chmod +x "$DIY_SCRIPT"
          ./"$DIY_SCRIPT"

      - name: Compile Toolchain
        if: env.REBUILD_TOOLCHAIN == 'true'
        id: toolchain
        run: |
          echo "Toolchain rebuild enabled."

      - name: Download DL Package
        run: |
          cd "$OPENWRT_PATH"
          make package/download -j"$(nproc)"

      - name: Compile Firmware
        id: compile
        run: |
          cd "$OPENWRT_PATH"
          mkdir -p files/etc/uci-defaults
          cp "$GITHUB_WORKSPACE/scripts/init-settings.sh" files/etc/uci-defaults/99-init-settings
          make -j"$(nproc)" || make -j1 V=s
          echo "FILE_DATE=$(date +"%Y.%m.%d")" >>"$GITHUB_ENV"
          echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >>"$GITHUB_ENV"

      - name: Packaging OpenWrt
        if: success()
        uses: unifreq/openwrt_packit@master
        env:
          # Keep these as-is if your action supports them.
          OPENWRT_ARMSR: openwrt/bin/targets/*/*/*rootfs.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_REPO_URL: ophub/kernel
          KERNEL_VERSION_NAME: 6.1.y_6.6.y_6.12.y
          KERNEL_AUTO_LATEST: true

      - name: Organize Files
        if: env.PACKAGED_STATUS == 'success'
        run: |
          set -euo pipefail
          df -hT
          cd "$OPENWRT_PATH"/bin/targets/*/*/
          echo "Targets check:"
          pwd
          cat config.buildinfo || true

          cp -rf "$OPENWRT_PATH"/bin/packages/* packages
          tar -zcf packages.tar.gz packages
          sleep 1
          sed '/^$/d' "$OPENWRT_PATH/.config" > config.txt

          echo "FIRMWARE_PATH=$PWD" >>"$GITHUB_ENV"

      - name: Upload OpenWrt To Artifact
        if: env.PACKAGED_STATUS == 'success' && github.event.inputs.artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SOURCE_REPO }}-firmware-${{ env.FILE_DATE }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}

      - name: Upload OpenWrt To Release
        if: env.PACKAGED_STATUS == 'success' && github.event.inputs.release == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.DATE }}
          allowUpdates: true
          removeArtifacts: true
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.FIRMWARE_PATH }}/*,${{ env.PACKAGED_OUTPUTPATH }}/*
